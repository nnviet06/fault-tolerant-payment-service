services:
  postgres:
    image: postgres:17-alpine
    ports: 
      - "5432:5432"
    environment:
     - POSTGRES_USER=user123
     - POSTGRES_PASSWORD=user123
     - POSTGRES_DB=userdb
    volumes:
     - postgres_data:/var/lib/postgresql/data

  redis: 
    image: redis:7-alpine
    ports:
     - "6379:6379"
    volumes: 
     - redis_data:/data

volumes: 
    redis_data:
    postgres_data: